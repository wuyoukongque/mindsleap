<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--ml-white);font-family:var(--font-sans);color:var(--ml-black);}
  .card{padding:24px 28px;box-sizing:border-box;}
  .card-row{display:flex;gap:16px;flex-wrap:wrap;align-items:center;}
  .swatch{display:flex;flex-direction:column;gap:8px;}
  .swatch-chip{width:120px;height:80px;border-radius:8px;box-shadow:var(--shadow-sm);}
  .swatch-chip--bordered{box-shadow:inset 0 0 0 1px var(--ml-gray-100), var(--shadow-sm);}
  .swatch-name{font-size:13px;font-weight:600;color:var(--ml-black);letter-spacing:-0.01em;}
  .swatch-hex{font-family:var(--font-mono);font-size:11px;color:var(--ml-gray-500);}
  .swatch-role{font-size:11px;color:var(--ml-gray-500);}
  .label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--ml-blue-accent);}
</style></head><body><div class="card" id="root"></div></body></html>

<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--font-sans);}
  .wrap{padding:22px 26px;display:flex;flex-direction:column;gap:18px;}
  .row{display:flex;gap:14px;flex-wrap:wrap;align-items:center;}
  .dark{background:#1e477c;padding:18px 22px;border-radius:12px;display:flex;gap:14px;align-items:center;}
  .grad{background:linear-gradient(135deg,#1e477c 0%,#2a5a9e 100%);padding:18px 22px;border-radius:12px;display:flex;gap:14px;align-items:center;}
  .btn{font-family:inherit;font-weight:700;cursor:pointer;border:0;display:inline-flex;align-items:center;gap:8px;letter-spacing:-0.01em;}
  .btn--pill{background:#1e477c;color:#fff;padding:8px 24px;border-radius:9999px;font-size:14px;box-shadow:0 10px 15px -3px rgba(0,0,0,.10);}
  .btn--cta{background:#fff;color:#1e477c;padding:14px 32px;border-radius:6px;font-size:16px;}
  .btn--ctaPill{background:#fff;color:#1e477c;padding:16px 40px;border-radius:9999px;font-size:17px;font-weight:600;}
  .btn--inline{background:transparent;color:#3b82f6;font-weight:700;font-size:14px;padding:0;}
  .btn--inline:hover{text-decoration:underline;}
  .lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:#9ca3af;}
</style></head><body>
<div class="wrap">
  <div class="row">
    <span class="lbl">Primary (light)</span>
    <button class="btn btn--pill">Join the Club</button>
  </div>
  <div class="dark">
    <span class="lbl" style="color:rgba(255,255,255,.6)">On photo</span>
    <button class="btn btn--cta">Learn More</button>
  </div>
  <div class="grad">
    <span class="lbl" style="color:rgba(255,255,255,.6)">On gradient</span>
    <button class="btn btn--ctaPill">Get In Touch <span style="font-size:18px">→</span></button>
  </div>
  <div class="row">
    <span class="lbl">Inline</span>
    <button class="btn btn--inline">View More →</button>
  </div>
</div>
</body></html>

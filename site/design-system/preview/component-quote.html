<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Quote callout</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#1e477c;font-family:var(--font-sans);color:#fff;}
  .wrap{padding:20px 26px;}
  .card{background:rgba(255,255,255,.10);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:22px 24px;}
  .q{font-size:20px;line-height:1.55;font-weight:300;font-style:italic;letter-spacing:-0.01em;margin:0;}
  .who{display:flex;align-items:center;gap:12px;margin-top:18px;}
  .av{width:44px;height:44px;border-radius:9999px;background:#fff;flex-shrink:0;color:#1e477c;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;}
  .n{font-weight:700;font-size:14px;color:#fff;letter-spacing:-0.01em;}
  .r{font-size:12px;color:#bfdbfe;line-height:1.4;}
</style></head><body>
<div class="wrap">
  <div class="card">
    <p class="q">&ldquo;Founders Space and MindsLeap are coming together to help entrepreneurs and businesses transform with AI.&rdquo;</p>
    <div class="who">
      <div class="av">SH</div>
      <div>
        <div class="n">Steve Hoffman</div>
        <div class="r">Founder &amp; Chairman, Founders Space</div>
      </div>
    </div>
  </div>
</div>
</body></html>

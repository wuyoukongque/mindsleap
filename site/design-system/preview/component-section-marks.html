<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Section bar</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--font-sans);}
  .wrap{padding:24px 26px;display:flex;gap:28px;align-items:flex-start;}
  .ex{flex:1;text-align:center;}
  .h{font-size:30px;font-weight:700;color:#1e477c;letter-spacing:-0.01em;line-height:1.1;}
  .bar{width:80px;height:4px;background:#3b82f6;margin:14px auto 0;}
  .sub{font-size:13px;color:#6b7280;margin-top:14px;line-height:1.5;max-width:300px;margin-left:auto;margin-right:auto;}
  .underline{display:inline-block;font-size:13px;color:#1e477c;font-weight:700;border-bottom:2px solid #3b82f6;padding-bottom:1px;}
  .check{display:flex;align-items:center;gap:10px;color:#1e477c;font-size:14px;font-weight:600;}
  .chip{width:22px;height:22px;border-radius:9999px;background:#dbeafe;display:flex;align-items:center;justify-content:center;color:#1e477c;font-size:11px;}
</style></head><body>
<div class="wrap">
  <div class="ex">
    <div class="h">MindsLeap Core Services</div>
    <div class="bar"></div>
    <div class="sub">A 20×4px blue-500 bar centered under every section title.</div>
  </div>
  <div class="ex" style="text-align:left">
    <span class="underline">Learn More</span>
    <div class="sub" style="margin-left:0">2px bottom border in blue-500 under inline link/CTA labels.</div>
    <div class="check" style="margin-top:14px"><span class="chip">✓</span>Founders Space Global Network</div>
  </div>
</div>
</body></html>

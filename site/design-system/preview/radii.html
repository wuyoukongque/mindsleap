<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--font-sans);}
  .wrap{padding:22px 26px;display:flex;gap:18px;align-items:flex-end;flex-wrap:wrap;}
  .item{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .box{width:70px;height:70px;background:#1e477c;}
  .pill{width:120px;height:42px;background:#1e477c;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700;}
  .name{font-size:11px;font-weight:700;color:#111;}
  .v{font-family:var(--font-mono);font-size:10px;color:#6b7280;}
  .use{font-size:10px;color:#9ca3af;text-align:center;max-width:130px;line-height:1.3;}
</style></head><body>
<div class="wrap">
  <div class="item"><div class="box" style="border-radius:6px"></div><div class="name">rounded-md</div><div class="v">6px</div><div class="use">hero CTA, image thumbs</div></div>
  <div class="item"><div class="box" style="border-radius:12px"></div><div class="name">rounded-xl</div><div class="v">12px</div><div class="use">service &amp; news cards</div></div>
  <div class="item"><div class="box" style="border-radius:16px"></div><div class="name">rounded-2xl</div><div class="v">16–24px</div><div class="use">quote callouts, big media</div></div>
  <div class="item"><div class="pill" style="border-radius:9999px">Join the Club</div><div class="name">rounded-full</div><div class="v">9999px</div><div class="use">nav CTA pill</div></div>
  <div class="item"><div class="box" style="width:48px;height:48px;border-radius:9999px"></div><div class="name">rounded-full</div><div class="v">circle</div><div class="use">avatar, social icon, check chip</div></div>
</div>
</body></html>

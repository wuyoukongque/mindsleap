<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Type · Bilingual</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--font-sans);color:#111;}
  .wrap{padding:22px 26px;display:grid;grid-template-columns:1fr 1fr;gap:24px;}
  h4{margin:0 0 8px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:#3b82f6;}
  .en .h{font-size:30px;font-weight:700;color:#1e477c;letter-spacing:-0.01em;line-height:1.15;}
  .zh .h{font-size:30px;font-weight:700;color:#1e477c;font-family:"Noto Sans SC","PingFang SC",sans-serif;line-height:1.2;letter-spacing:0;}
  .en p{font-size:15px;line-height:1.55;color:#4b5563;margin:8px 0 0;}
  .zh p{font-size:15px;line-height:1.7;color:#4b5563;font-family:"Noto Sans SC","PingFang SC",sans-serif;margin:8px 0 0;}
  .meta{font-size:11px;color:#9ca3af;margin-top:8px;font-family:var(--font-mono);}
</style></head><body>
<div class="wrap">
  <div class="en">
    <h4>English · Inter / SF Pro</h4>
    <div class="h">Joyful Transformation</div>
    <p>Turning enterprise AI anxiety into a joyful cognitive-upgrade journey.</p>
    <div class="meta">letter-spacing -0.01em · line 1.5</div>
  </div>
  <div class="zh">
    <h4>中文 · Noto Sans SC</h4>
    <div class="h">心智悦动</div>
    <p>让 AI 转型不再是焦虑，而是一次愉快的认知升级之旅。</p>
    <div class="meta">letter-spacing 0 · line 1.7</div>
  </div>
</div>
</body></html>

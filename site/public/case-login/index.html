<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MindsLeap Case Access</title>
  <style>
    :root {
      --blue: #1e477c;
      --ink: #101828;
      --muted: #667085;
      --line: #d0d5dd;
      --soft: #f3f7ff;
      --white: #ffffff;
      --danger: #b42318;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 28px;
      background:
        linear-gradient(135deg, rgba(30, 71, 124, 0.08), rgba(255, 255, 255, 0.94)),
        var(--soft);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", "Noto Sans SC", "PingFang SC", sans-serif;
    }

    .panel {
      width: min(440px, 100%);
      padding: 36px;
      border: 1px solid rgba(30, 71, 124, 0.14);
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 28px 80px rgba(16, 24, 40, 0.12);
    }

    .logo {
      width: 230px;
      height: 46px;
      margin-bottom: 34px;
      background: url("/decks/shared/mindsleap-template/mindsleap-founderspace-joint-logo-blue.svg") left center / contain no-repeat;
    }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--blue);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .14em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      color: var(--blue);
      font-size: 34px;
      line-height: 1.12;
      letter-spacing: -0.03em;
    }

    p {
      margin: 16px 0 26px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.65;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: var(--ink);
      font-size: 13px;
      font-weight: 700;
    }

    input {
      width: 100%;
      height: 48px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 0;
      color: var(--ink);
      background: var(--white);
      font: inherit;
      outline: none;
    }

    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(30, 71, 124, 0.12);
    }

    button {
      width: 100%;
      height: 48px;
      margin-top: 16px;
      border: 0;
      border-radius: 0;
      background: var(--blue);
      color: var(--white);
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    .error {
      min-height: 22px;
      margin-top: 12px;
      color: var(--danger);
      font-size: 13px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="panel">
    <div class="logo" aria-label="MindsLeap"></div>
    <p class="eyebrow">MindsLeap Case Archive</p>
    <h1>请输入访问密码</h1>
    <p>案例库内容仅供项目沟通与内部复盘使用。请输入访问密码后继续查看。</p>
    <form id="case-login-form">
      <label for="case-password">访问密码</label>
      <input id="case-password" name="password" type="password" autocomplete="current-password" autofocus />
      <button type="submit">进入案例库</button>
      <div class="error" id="case-login-error" role="alert" aria-live="polite"></div>
    </form>
  </main>

  <script>
    const PASSWORD = "mindsleapcase";
    const COOKIE = "mindsleap_case_access";
    const form = document.getElementById("case-login-form");
    const input = document.getElementById("case-password");
    const error = document.getElementById("case-login-error");

    const params = new URLSearchParams(window.location.search);
    const next = params.get("next") || "/case";
    const target = next.startsWith("/case") ? next : "/case";

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      if (input.value.trim() !== PASSWORD) {
        error.textContent = "密码不正确，请重新输入。";
        input.select();
        return;
      }

      const secure = window.location.protocol === "https:" ? "; Secure" : "";
      document.cookie = `${COOKIE}=${PASSWORD}; Path=/; Max-Age=604800; SameSite=Lax${secure}`;
      window.location.href = target;
    });
  </script>
</body>
</html>

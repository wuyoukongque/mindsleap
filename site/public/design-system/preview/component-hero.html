<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Hero overlay</title>
<style>
  html,body{margin:0;padding:0;background:#000;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;color:#fff;}
  .h{position:relative;width:100%;height:280px;overflow:hidden;}
  .bg{position:absolute;inset:0;background:linear-gradient(135deg,#2a5a9e 0%,#152f54 60%,#0b1c33 100%);}
  .bg::after{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at 70% 30%,rgba(255,255,255,.25),transparent 60%);}
  .ov{position:absolute;inset:0;background:rgba(0,0,0,.40);}
  .body{position:relative;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 24px;}
  .eyebrow{font-size:14px;font-weight:500;text-transform:uppercase;letter-spacing:.18em;color:#fff;}
  .h1{font-size:48px;font-weight:700;line-height:1.05;margin:10px 0 12px;letter-spacing:-0.015em;}
  .sub{font-size:14px;color:#e5e7eb;max-width:520px;margin-bottom:20px;}
  .cta{background:#fff;color:#1e477c;padding:12px 28px;border-radius:6px;font-size:14px;font-weight:700;text-decoration:none;}
  .dots{position:absolute;bottom:14px;left:0;right:0;display:flex;gap:8px;justify-content:center;}
  .dot{width:8px;height:8px;border-radius:9999px;background:rgba(255,255,255,.30);}
  .dot.on{background:#fff;}
</style></head><body>
<div class="h">
  <div class="bg"></div>
  <div class="ov"></div>
  <div class="body">
    <div class="eyebrow">AI Founders Club</div>
    <div class="h1">Upgrade AI Mindsets<br>for Global Success</div>
    <div class="sub">Upgrade cutting-edge AI thinking, refuse to fall behind.</div>
    <a class="cta">Join the Club</a>
    <div class="dots"><span class="dot on"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
  </div>
</div>
</body></html>

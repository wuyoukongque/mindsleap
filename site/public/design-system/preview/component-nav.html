<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Nav</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#f9fafb;font-family:var(--font-sans);}
  .nav{height:72px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-bottom:1px solid #f3f4f6;box-shadow:0 1px 2px 0 rgba(0,0,0,.04);display:flex;align-items:center;padding:0 28px;justify-content:space-between;}
  .logo{display:flex;align-items:center;}
  .logo img{height:32px;}
  .links{display:flex;gap:28px;align-items:center;}
  .links a{font-size:13px;font-weight:600;color:#1e477c;text-decoration:none;letter-spacing:-0.01em;}
  .lang{font-size:13px;color:#9ca3af;font-weight:500;}
  .cta{background:#1e477c;color:#fff;padding:8px 22px;border-radius:9999px;font-size:13px;font-weight:700;box-shadow:0 10px 15px -3px rgba(0,0,0,.10);}
</style></head><body>
<div class="nav">
  <div class="logo"><img src="../assets/logos/mindsleap-logo-blue.png" alt="MindsLeap"></div>
  <div class="links">
    <a>AI Club</a><a>Incubation</a><a>Training</a><a>Study Tours</a><a>News</a><a>About</a>
    <span class="lang">EN</span>
    <a class="cta" style="color:#fff">Join the Club</a>
  </div>
</div>
</body></html>

<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--font-sans);}
  .wrap{padding:22px 26px;}
  table{border-collapse:collapse;width:100%;font-size:13px;}
  th,td{text-align:left;padding:6px 10px 6px 0;}
  th{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:#9ca3af;font-weight:700;border-bottom:1px solid #f3f4f6;}
  td{border-bottom:1px solid #f9fafb;color:#4b5563;}
  .bar{display:inline-block;background:#1e477c;height:10px;border-radius:2px;vertical-align:middle;}
  .name{font-weight:600;color:#111;}
  .val{font-family:var(--font-mono);color:#1e477c;font-size:12px;}
  .use{color:#6b7280;font-size:12px;}
</style></head><body>
<div class="wrap">
  <table>
    <thead><tr><th>Token</th><th>px</th><th></th><th>Used for</th></tr></thead>
    <tbody>
      <tr><td class="name">space-4</td><td class="val">16</td><td><span class="bar" style="width:16px"></span></td><td class="use">tight gap, inline icon→label</td></tr>
      <tr><td class="name">space-6</td><td class="val">24</td><td><span class="bar" style="width:24px"></span></td><td class="use">CTA pill x-padding · footer link gap</td></tr>
      <tr><td class="name">space-8</td><td class="val">32</td><td><span class="bar" style="width:32px"></span></td><td class="use">grid gap default</td></tr>
      <tr><td class="name">space-12</td><td class="val">48</td><td><span class="bar" style="width:48px"></span></td><td class="use">major column gap</td></tr>
      <tr><td class="name">space-16</td><td class="val">64</td><td><span class="bar" style="width:64px"></span></td><td class="use">section header → grid</td></tr>
      <tr><td class="name">space-20</td><td class="val">80</td><td><span class="bar" style="width:80px"></span></td><td class="use">footer top padding</td></tr>
      <tr><td class="name">space-24</td><td class="val">96</td><td><span class="bar" style="width:96px"></span></td><td class="use">marquee section py</td></tr>
    </tbody>
  </table>
</div>
</body></html>

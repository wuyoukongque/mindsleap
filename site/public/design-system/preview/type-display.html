<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Type · Display</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--font-sans);}
  .wrap{padding:18px 26px 22px;}
  .eyebrow{font-size:12px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--ml-gray-400);}
  .h1{font-size:60px;line-height:1.05;font-weight:700;letter-spacing:-0.015em;color:var(--ml-black);margin:4px 0 0;}
  .h1 .br{display:block;}
  .sub{font-size:14px;color:var(--ml-gray-500);margin-top:10px;display:flex;gap:16px;flex-wrap:wrap;}
  .sub code{font-family:var(--font-mono);color:var(--ml-blue);background:#eff6ff;padding:1px 6px;border-radius:4px;}
</style></head><body>
<div class="wrap">
  <div class="eyebrow">AI Founders Club</div>
  <h1 class="h1">Upgrade AI Mindsets<span class="br">for Global Success</span></h1>
  <div class="sub"><span><code>5xl–7xl · bold · -0.01em</code></span><span>Inter / SF Pro · explicit \n line break</span></div>
</div>
</body></html>

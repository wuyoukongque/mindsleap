<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Type · Headings</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--font-sans);}
  .wrap{padding:22px 26px;display:flex;flex-direction:column;gap:14px;}
  .row{display:flex;align-items:baseline;gap:16px;}
  .meta{font-family:var(--font-mono);font-size:11px;color:var(--ml-gray-400);min-width:120px;}
  .h2{font-size:36px;line-height:1.15;font-weight:700;color:var(--ml-blue);letter-spacing:-0.01em;}
  .h3{font-size:20px;line-height:1.2;font-weight:700;color:var(--ml-blue);}
  .eyebrow{font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#3b82f6;}
  .bar{display:block;width:80px;height:4px;background:#3b82f6;margin-top:6px;}
</style></head><body>
<div class="wrap">
  <div class="row"><span class="meta">h2 · 36/700</span><span class="h2">MindsLeap Core Services</span></div>
  <div class="bar"></div>
  <div class="row"><span class="meta">h3 · 20/700</span><span class="h3">AI Founders Club</span></div>
  <div class="row"><span class="meta">eyebrow · 12/700</span><span class="eyebrow">Founders Talk</span></div>
</div>
</body></html>

<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <base href="/manuals/codex-installation/" />
  <title>电脑环境准备 | AI 数字员工实战坊 · MindsLeap</title>
  <style>
    @font-face {
      font-family: "MindsLeap Brand";
      src: url("./platform-assets/MindsLeap-Brand.otf") format("opentype");
      font-weight: 100 900;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --brand: #1e477c;
      --brand-light: #2a5a9e;
      --brand-dark: #152f54;
      --accent: #3b82f6;
      --accent-soft: #eff6ff;
      --bg: #ffffff;
      --bg-2: #ffffff;
      --surface: #ffffff;
      --surface-strong: #f8fafc;
      --line: #e8edf3;
      --line-strong: #bfdbfe;
      --text: #111827;
      --muted: #4b5563;
      --faint: #6b7280;
      --danger: #b42318;
      --ok: #067647;
      --shadow: 0 2px 6px rgba(16, 24, 40, 0.05), 0 22px 54px rgba(30, 71, 124, 0.11);
      --radius-card: 8px;
      --radius-control: 8px;
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      --brand-font: "MindsLeap Brand", "Noto Sans SC", "PingFang SC", system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      overflow-x: clip;
      background:
        linear-gradient(180deg, #ffffff 0%, #f9fafb 58%, #ffffff 100%);
    }

    body {
      margin: 0;
      min-height: 100dvh;
      overflow-x: clip;
      font-family: var(--font);
      color: var(--text);
      letter-spacing: 0;
      background: var(--bg);
    }

    body::before {
      content: none;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button,
    a {
      -webkit-tap-highlight-color: transparent;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      display: block;
      max-width: 100%;
    }

    .app {
      position: relative;
      min-height: 100dvh;
      isolation: isolate;
    }

    .hidden {
      display: none !important;
    }

    .nowrap {
      white-space: nowrap;
    }

    .container {
      width: min(1180px, calc(100% - 40px));
      margin: 0 auto;
    }

    .login-shell {
      position: relative;
      width: min(1120px, calc(100% - 80px));
      margin: 0 auto;
      min-height: 100dvh;
      display: grid;
      grid-template-columns: minmax(0, 560px) minmax(360px, 430px);
      gap: clamp(44px, 6vw, 72px);
      align-items: center;
      align-content: center;
      justify-content: center;
      padding: clamp(40px, 6vh, 72px) 0;
    }

    .login-logo {
      position: fixed;
      top: 32px;
      left: max(32px, calc((100vw - 1120px) / 2));
      display: inline-flex;
      align-items: center;
      min-height: 40px;
    }

    .login-story {
      min-height: auto;
      display: flex;
      align-items: flex-start;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
      overflow: visible;
      position: relative;
    }

    .login-story::before {
      content: none;
    }

    .login-copy {
      position: relative;
      z-index: 1;
    }

    .login-copy {
      max-width: 620px;
    }

    .login-logo img {
      height: 36px;
      width: auto;
      object-fit: contain;
    }

    .event-badge {
      width: fit-content;
      padding: 8px 12px;
      border: 1px solid var(--line-strong);
      border-radius: 999px;
      color: var(--accent);
      background: var(--accent-soft);
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 18px;
    }

    .login-copy h1 {
      margin: 0;
      max-width: 720px;
      font-family: var(--brand-font);
      font-size: clamp(40px, 4.1vw, 58px);
      line-height: 1.08;
      font-weight: 760;
      color: var(--brand);
      letter-spacing: 0;
    }

    .login-copy h1 span,
    .hero-panel h1 span {
      display: block;
    }

    .title-main {
      white-space: nowrap;
    }

    .login-copy .lead {
      margin: 22px 0 0;
      max-width: 610px;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.65;
    }

    .login-media {
      margin: 30px 0 0;
      width: min(520px, 100%);
      border: 1px solid var(--line);
      border-radius: var(--radius-card);
      overflow: hidden;
      background: var(--surface-strong);
      box-shadow: 0 2px 6px rgba(16, 24, 40, 0.05), 0 28px 68px rgba(30, 71, 124, 0.14);
    }

    .login-media img {
      width: 100%;
      aspect-ratio: 16 / 10;
      object-fit: cover;
      object-position: center;
    }

    .login-panel {
      position: relative;
      overflow: hidden;
      align-self: center;
      border: 1px solid var(--line);
      border-radius: var(--radius-card);
      padding: 30px;
      background: var(--surface);
      box-shadow: 0 2px 6px rgba(16, 24, 40, 0.05), 0 34px 80px rgba(30, 71, 124, 0.15);
      transition: box-shadow 180ms ease, border-color 180ms ease;
    }

    .login-panel::before {
      content: "";
      position: absolute;
      top: 0;
      left: -46%;
      width: 46%;
      height: 3px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(30, 71, 124, 0), var(--brand), rgba(59, 130, 246, 0.78), rgba(30, 71, 124, 0));
      opacity: 0;
      transform: translateX(-100%);
      pointer-events: none;
    }

    .login-panel.is-loading {
      border-color: rgba(30, 71, 124, 0.28);
      box-shadow: 0 2px 6px rgba(16, 24, 40, 0.05), 0 38px 90px rgba(30, 71, 124, 0.20), 0 0 0 4px rgba(30, 71, 124, 0.05);
    }

    .login-panel.is-loading::before {
      opacity: 1;
      animation: login-progress 1.05s cubic-bezier(0.65, 0, 0.35, 1) infinite;
    }

    .login-panel h2 {
      margin: 0 0 8px;
      font-size: 24px;
      line-height: 1.25;
    }

    .login-panel .sub {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .login-rules {
      margin: -4px 0 18px;
      border: 1px solid var(--line);
      border-radius: var(--radius-card);
      background: #f9fafb;
      overflow: hidden;
    }

    .login-rules summary {
      padding: 12px 14px;
      color: var(--brand);
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      list-style: none;
    }

    .login-rules summary::-webkit-details-marker {
      display: none;
    }

    .login-rules summary::after {
      content: "+";
      float: right;
      color: var(--accent);
      font-weight: 900;
    }

    .login-rules[open] summary::after {
      content: "-";
    }

    .login-rules ul {
      margin: 0;
      padding: 0 14px 14px 30px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .field {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
    }

    .field label {
      color: var(--text);
      font-size: 13px;
      font-weight: 700;
    }

    .required-mark {
      margin-left: 3px;
      color: var(--danger);
      font-weight: 900;
    }

    .field .hint {
      color: var(--faint);
      font-size: 12px;
      line-height: 1.45;
    }

    .input,
    .textarea,
    .select {
      width: 100%;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: var(--radius-control);
      background: #ffffff;
      outline: none;
      transition: border-color 160ms ease, background 160ms ease, box-shadow 160ms ease;
    }

    .input,
    .select {
      min-height: 46px;
      padding: 0 13px;
    }

    .textarea {
      min-height: 104px;
      resize: vertical;
      padding: 12px 13px;
      line-height: 1.55;
    }

    .field-tall .textarea {
      min-height: 180px;
    }

    .field-xl .textarea {
      min-height: 230px;
    }

    .input::placeholder,
    .textarea::placeholder {
      color: #9ca3af;
    }

    .input:focus,
    .textarea:focus,
    .select:focus {
      border-color: var(--accent);
      background: #ffffff;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.16);
    }

    .pasted-images {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-height: 0;
    }

    .pasted-image {
      width: 92px;
      border: 1px solid var(--line);
      border-radius: var(--radius-card);
      overflow: hidden;
      background: #ffffff;
      box-shadow: 0 1px 2px rgba(16, 24, 40, 0.04);
    }

    .pasted-image img {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      background: #f9fafb;
    }

    .pasted-image span {
      display: block;
      padding: 5px 6px;
      color: var(--faint);
      font-size: 11px;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .avatar-row {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .avatar-preview {
      width: 58px;
      height: 58px;
      flex: 0 0 auto;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--accent-soft);
      display: grid;
      place-items: center;
      color: var(--accent);
      font-weight: 800;
      overflow: hidden;
    }

    .avatar-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .file-input {
      width: 100%;
      color: var(--muted);
      font-size: 13px;
    }

    .image-file-field {
      padding: 13px;
      border: 1px dashed #bfdbfe;
      border-radius: var(--radius-control);
      background: #f8fbff;
    }

    .btn {
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 16px;
      border-radius: 999px;
      color: var(--brand);
      background: #ffffff;
      border: 1px solid var(--line);
      font-weight: 800;
      transition: transform 160ms ease, background 160ms ease, border-color 160ms ease, color 160ms ease;
      white-space: nowrap;
    }

    .btn:hover {
      background: #f8fbff;
      border-color: var(--line-strong);
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--brand) 0%, var(--brand-light) 100%);
      border-color: var(--brand);
      color: #ffffff;
      box-shadow: 0 10px 24px rgba(30, 71, 124, 0.24);
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, #25578f 0%, #3370b7 100%);
    }

    .btn.is-loading,
    .btn:disabled {
      cursor: wait;
      transform: none;
    }

    .btn.is-loading {
      background: linear-gradient(135deg, var(--brand) 0%, #3168a8 100%);
      box-shadow: 0 12px 30px rgba(30, 71, 124, 0.28);
    }

    .login-button-spinner {
      display: none;
      width: 16px;
      height: 16px;
      border-radius: 999px;
      border: 2px solid rgba(255, 255, 255, 0.42);
      border-top-color: #ffffff;
      flex: 0 0 auto;
      animation: login-spin 720ms linear infinite;
    }

    .btn.is-loading .login-button-spinner {
      display: inline-block;
    }

    .btn.is-loading i {
      display: none;
    }

    .login-loading-text {
      display: none;
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      line-height: 1.5;
      text-align: center;
    }

    .login-panel.is-loading .login-loading-text {
      display: block;
    }

    @keyframes login-spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes login-progress {
      0% {
        transform: translateX(-110%);
      }

      100% {
        transform: translateX(320%);
      }
    }

    .btn-ghost {
      color: var(--accent);
      background: var(--accent-soft);
      border-color: var(--line-strong);
    }

    .btn-wide {
      width: 100%;
    }

    .btn i,
    .nav-link i,
    .icon-btn i,
    .task-link i {
      width: 17px;
      height: 17px;
      stroke-width: 2;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .topbar-inner {
      height: 72px;
      width: min(1180px, calc(100% - 40px));
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .app-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 150px;
    }

    .app-brand img {
      height: 30px;
      width: auto;
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .nav-link {
      height: 38px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 0 12px;
      border-radius: 999px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 750;
      transition: background 160ms ease, color 160ms ease;
      white-space: nowrap;
    }

    .nav-link:hover,
    .nav-link.active {
      color: var(--brand);
      background: var(--accent-soft);
    }

    .user-chip {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      min-width: 190px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .user-mini-avatar {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      overflow: hidden;
      background: var(--accent-soft);
      border: 1px solid var(--line-strong);
      display: grid;
      place-items: center;
      color: var(--accent);
      font-weight: 900;
    }

    .user-mini-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .logout-btn {
      min-height: 32px;
      padding: 0 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      color: var(--brand);
      background: #ffffff;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .logout-btn:hover {
      background: var(--accent-soft);
      border-color: var(--line-strong);
    }

    .main {
      padding: 50px 0 72px;
    }

    .home-hero {
      display: grid;
      grid-template-columns: minmax(0, 0.92fr) minmax(360px, 0.78fr);
      gap: clamp(34px, 5vw, 72px);
      align-items: center;
      padding: clamp(42px, 7vw, 82px) 0 clamp(22px, 4vw, 40px);
      min-height: auto;
    }

    .hero-panel {
      position: relative;
      overflow: visible;
      max-width: none;
      padding: 0;
      background: transparent;
    }

    .hero-panel::before {
      content: none;
    }

    .hero-content {
      position: relative;
      z-index: 1;
      min-height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: 24px;
    }

    .hero-panel h1 {
      margin: 0;
      font-family: var(--brand-font);
      font-size: clamp(40px, 4.8vw, 62px);
      line-height: 1.06;
      color: var(--brand);
      letter-spacing: 0;
    }

    .hero-panel .hero-lead {
      margin: 0;
      max-width: 900px;
      color: var(--brand-dark);
      font-size: clamp(22px, 2.1vw, 30px);
      line-height: 1.36;
      font-weight: 760;
    }

    .hero-panel .hero-sub {
      margin: 12px 0 0;
      max-width: 560px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.7;
      white-space: nowrap;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 24px;
    }

    .btn-plaza {
      color: var(--brand);
      background: #ffffff;
      border-color: rgba(30, 71, 124, 0.32);
      box-shadow: 0 10px 24px rgba(30, 71, 124, 0.08);
    }

    .btn-plaza:hover {
      color: #ffffff;
      background: var(--brand);
      border-color: var(--brand);
    }

    .hero-media {
      position: relative;
      margin: 0;
      min-height: 380px;
      border: 1px solid var(--line);
      border-radius: var(--radius-card);
      overflow: hidden;
      background: var(--surface-strong);
      box-shadow: 0 2px 6px rgba(16, 24, 40, 0.05), 0 34px 84px rgba(30, 71, 124, 0.15);
    }

    .hero-media img {
      width: 100%;
      height: 100%;
      min-height: 380px;
      object-fit: cover;
      object-position: center;
    }

    .hero-media::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(21, 47, 84, 0.08));
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.22);
    }

    .section {
      margin-top: 28px;
      border: 1px solid var(--line);
      border-radius: var(--radius-card);
      background: var(--surface);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .workbench-section {
      margin-top: 32px;
      box-shadow: 0 2px 6px rgba(16, 24, 40, 0.05), 0 30px 76px rgba(30, 71, 124, 0.13);
    }

    .section-head {
      padding: 30px 32px 22px;
      border-bottom: 1px solid var(--line);
    }

    .section-head h2 {
      margin: 0;
      font-size: 30px;
      line-height: 1.24;
      color: var(--brand);
    }

    .section-head p {
      margin: 10px 0 0;
      max-width: 760px;
      color: var(--muted);
      line-height: 1.7;
    }

    .timeline {
      padding: 22px 24px 28px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .phase {
      position: relative;
      border: 1px solid var(--line);
      border-radius: var(--radius-card);
      background: #ffffff;
      overflow: hidden;
      box-shadow: 0 1px 2px rgba(16, 24, 40, 0.03), 0 16px 42px rgba(30, 71, 124, 0.06);
      transition: border-color 160ms ease, box-shadow 160ms ease, transform 160ms ease, background 160ms ease;
    }

    .phase.phase-active {
      border-color: rgba(21, 47, 84, 0.9);
      background:
        linear-gradient(160deg, rgba(255, 255, 255, 0.10) 0%, rgba(255, 255, 255, 0) 34%),
        linear-gradient(145deg, #214f89 0%, #1e477c 48%, #14365f 100%);
      color: #ffffff;
      box-shadow: 0 2px 6px rgba(16, 24, 40, 0.08), 0 30px 78px rgba(30, 71, 124, 0.25);
    }

    .phase.phase-active::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(90deg, rgba(255, 255, 255, 0.16), transparent 28%, rgba(255, 255, 255, 0.08));
      opacity: 0.7;
    }

    .phase-head {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      padding: 22px 22px 16px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #ffffff 0%, #fbfdff 100%);
    }

    .phase.phase-active .phase-head {
      border-bottom-color: rgba(255, 255, 255, 0.14);
      background: transparent;
    }

    .phase-head strong {
      display: block;
      font-size: 24px;
      line-height: 1.18;
      margin-bottom: 8px;
    }

    .phase-head span {
      color: var(--muted);
      font-size: 13px;
    }

    .phase.phase-active .phase-head strong,
    .phase.phase-active .phase-head span {
      color: #ffffff;
    }

    .phase.phase-active .phase-date-row > span:not(.phase-status) {
      color: rgba(255, 255, 255, 0.78);
    }

    .phase-date-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .phase-status {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 0 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.26);
      color: #ffffff;
      font-size: 11px;
      font-weight: 850;
      white-space: nowrap;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.18);
    }

    .task-list {
      position: relative;
      z-index: 1;
      padding: 12px;
      display: grid;
      gap: 12px;
    }

    .task-link {
      width: 100%;
      min-height: 104px;
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      gap: 14px;
      align-items: start;
      padding: 16px;
      text-align: left;
      border: 1px solid var(--line);
      border-radius: var(--radius-card);
      background: #ffffff;
      color: var(--text);
      box-shadow: 0 1px 2px rgba(16, 24, 40, 0.03);
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease, box-shadow 160ms ease;
    }

    .task-link:hover {
      transform: translateY(-2px);
      border-color: var(--line-strong);
      background: #f8fbff;
      box-shadow: 0 12px 28px rgba(30, 71, 124, 0.10);
    }

    .task-link.task-link-active {
      border-color: rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.10);
      color: #ffffff;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.10);
    }

    .task-link.task-link-active:hover {
      background: rgba(255, 255, 255, 0.16);
      border-color: rgba(255, 255, 255, 0.30);
    }

    .task-link.task-link-active strong {
      color: #ffffff;
    }

    .task-link.task-link-active p {
      color: rgba(255, 255, 255, 0.84);
    }

    .task-link:active {
      transform: translateY(1px);
    }

    .task-index {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      color: var(--brand);
      background: var(--accent-soft);
      border: 1px solid var(--line-strong);
      font-size: 12px;
      font-weight: 900;
      line-height: 1;
    }

    .task-link.task-link-active .task-index {
      color: #ffffff;
      background: rgba(255, 255, 255, 0.13);
      border-color: rgba(255, 255, 255, 0.22);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.16);
    }

    .task-copy {
      min-width: 0;
    }

    .task-title-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .task-link strong {
      font-size: 18px;
      line-height: 1.35;
    }

    .task-link p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      min-height: 28px;
      padding: 0 11px 0 10px;
      border-radius: 999px;
      background: #ffffff;
      border: 1px solid var(--line-strong);
      color: var(--brand);
      font-size: 12px;
      font-weight: 860;
      white-space: nowrap;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.72);
    }

    .status-pill::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: currentColor;
      opacity: 0.9;
    }

    .status-pill.is-pending {
      background: var(--brand);
      border-color: var(--brand);
      color: #ffffff;
      box-shadow: 0 8px 18px rgba(30, 71, 124, 0.22);
    }

    .status-pill.is-pending::before {
      background: #ffffff;
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.16);
    }

    .task-link.task-link-active .status-pill.is-pending {
      background: #ffffff;
      border-color: rgba(255, 255, 255, 0.78);
      color: var(--brand);
      box-shadow: 0 10px 22px rgba(8, 30, 65, 0.18);
    }

    .task-link.task-link-active .status-pill.is-pending::before {
      background: var(--brand);
      box-shadow: 0 0 0 3px rgba(30, 71, 124, 0.10);
    }

    .status-pill.is-submitted {
      background: #078354;
      border-color: #078354;
      color: #ffffff;
      box-shadow: 0 8px 18px rgba(7, 131, 84, 0.22);
    }

    .status-pill.is-submitted::before {
      content: "✓";
      width: 14px;
      height: 14px;
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, 0.18);
      color: #ffffff;
      font-size: 10px;
      line-height: 1;
      opacity: 1;
    }

    .status-pill.is-static {
      background: #ffffff;
      border-color: rgba(255, 255, 255, 0.42);
      color: var(--brand);
    }

    .info-block {
      border: 1px solid var(--line);
      border-radius: var(--radius-card);
      padding: 20px;
      background: #ffffff;
    }

    .info-block h3 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .info-block p,
    .info-block li {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .info-block ul {
      margin: 0;
      padding-left: 18px;
    }

    .page-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 22px;
    }

    .page-head h1 {
      margin: 0;
      font-size: clamp(32px, 4vw, 52px);
      line-height: 1.15;
      letter-spacing: 0;
    }

    .page-head p {
      margin: 10px 0 0;
      max-width: 680px;
      color: var(--muted);
      line-height: 1.7;
    }

    .detail-layout {
      display: grid;
      grid-template-columns: minmax(0, 0.72fr) minmax(300px, 0.28fr);
      gap: 18px;
    }

    .content-panel,
    .side-panel {
      border: 1px solid var(--line);
      border-radius: var(--radius-card);
      background: var(--surface);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .content-inner {
      padding: 24px;
    }

    .content-inner h2,
    .content-inner h3 {
      margin: 0 0 14px;
    }

    .content-inner p {
      color: var(--muted);
      line-height: 1.75;
    }

    .prep-checklist {
      display: grid;
      gap: 12px;
      margin: 20px 0 0;
    }

    .prep-item {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      gap: 12px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius-card);
      background: #ffffff;
    }

    .prep-item .check {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: rgba(88, 210, 255, 0.12);
      color: var(--accent);
      font-weight: 900;
    }

    .prep-item strong {
      display: block;
      margin-bottom: 4px;
    }

    .prep-item span {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .prep-guide {
      display: grid;
      gap: 18px;
    }

    .prep-hero-card {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 190px;
      gap: 18px;
      align-items: center;
      padding: 24px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius-card);
      background:
        radial-gradient(circle at 92% 16%, rgba(59, 130, 246, 0.12), transparent 34%),
        linear-gradient(180deg, #ffffff 0%, #f3f7fc 100%);
    }

    .prep-kicker {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      color: var(--accent);
      background: var(--accent-soft);
      border: 1px solid var(--line-strong);
      font-size: 12px;
      font-weight: 850;
      margin-bottom: 12px;
    }

    .prep-hero-card h2 {
      margin: 0;
      color: var(--brand);
      font-size: clamp(28px, 3.2vw, 42px);
      line-height: 1.16;
    }

    .prep-hero-card p {
      margin: 12px 0 0;
      color: var(--muted);
      line-height: 1.75;
    }

    .prep-hero-logo {
      min-height: 170px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: var(--radius-card);
      background: #ffffff;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.72);
    }

    .prep-hero-logo img {
      width: 108px;
      height: auto;
    }

    .prep-pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }

    .prep-pill {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 0 10px;
      border-radius: 999px;
      background: #ffffff;
      border: 1px solid var(--line);
      color: var(--brand);
      font-size: 12px;
      font-weight: 850;
      white-space: nowrap;
    }

    .prep-section {
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: var(--radius-card);
      background: #ffffff;
    }

    .prep-section h3 {
      margin: 0 0 10px;
      color: var(--text);
      font-size: 24px;
      line-height: 1.3;
    }

    .prep-section h4 {
      margin: 0 0 8px;
      color: var(--brand);
      font-size: 17px;
      line-height: 1.35;
    }

    .prep-section p {
      margin: 0;
      color: var(--muted);
      line-height: 1.75;
    }

    .prep-section a {
      color: var(--accent);
      font-weight: 800;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .prep-section a:hover {
      color: var(--brand);
    }

    .prep-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 16px;
    }

    .prep-card {
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius-card);
      background: var(--surface-strong);
    }

    .prep-card strong {
      display: block;
      margin-bottom: 6px;
      color: var(--text);
    }

    .prep-card span,
    .prep-card li {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.65;
    }

    .prep-card ul {
      margin: 8px 0 0;
      padding-left: 17px;
    }

    .prep-callout {
      margin-top: 16px;
      padding: 16px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius-card);
      background: var(--accent-soft);
      color: var(--brand);
    }

    .prep-callout strong {
      display: block;
      margin-bottom: 6px;
      color: var(--brand);
    }

    .prep-callout p,
    .prep-callout li {
      color: #24476f;
      font-size: 13px;
      line-height: 1.7;
    }

    .prep-callout ul,
    .prep-callout ol {
      margin: 8px 0 0;
      padding-left: 18px;
    }

    .prep-callout.warn {
      border-color: #fed7aa;
      background: #fff7ed;
    }

    .prep-callout.warn strong {
      color: #9a3412;
    }

    .prep-callout.warn p,
    .prep-callout.warn li {
      color: #7c2d12;
    }

    .prep-steps {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }

    .prep-step {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      gap: 12px;
      align-items: start;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius-card);
      background: #ffffff;
    }

    .prep-step-num {
      width: 30px;
      height: 30px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      color: #ffffff;
      background: var(--brand);
      font-size: 12px;
      font-weight: 900;
    }

    .prep-step strong {
      display: block;
      margin-bottom: 4px;
      color: var(--text);
    }

    .prep-step span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.65;
    }

    .prep-media {
      margin-top: 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius-card);
      background: #ffffff;
      overflow: hidden;
    }

    .prep-media img {
      width: 100%;
      height: auto;
      background: #ffffff;
    }

    .prep-media figcaption {
      padding: 10px 12px;
      border-top: 1px solid var(--line);
      color: var(--faint);
      font-size: 12px;
      line-height: 1.55;
    }

    .prep-app-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .prep-app-shot {
      border: 1px solid var(--line);
      border-radius: var(--radius-card);
      background: #ffffff;
      overflow: hidden;
    }

    .prep-app-shot img {
      width: 100%;
      aspect-ratio: 1 / 0.94;
      object-fit: contain;
      object-position: center;
      padding: 10px;
      background: #ffffff;
    }

    .prep-app-shot figcaption {
      padding: 10px 12px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      border-top: 1px solid var(--line);
    }

    .prep-link-list {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }

    .prep-link-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 48px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius-card);
      background: #ffffff;
    }

    .prep-link-row span {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .prep-link-row strong {
      color: var(--text);
      font-size: 14px;
      white-space: nowrap;
    }

    .prep-price-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .prep-price {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius-card);
      background: #ffffff;
    }

    .prep-price strong {
      display: block;
      color: var(--brand);
      font-size: 18px;
      margin-bottom: 4px;
    }

    .prep-price span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .prep-side-list {
      display: grid;
      gap: 10px;
      margin: 0 0 16px;
    }

    .prep-side-list div {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius-card);
      background: #ffffff;
    }

    .prep-side-list strong {
      display: block;
      color: var(--text);
      font-size: 13px;
      margin-bottom: 4px;
    }

    .prep-side-list span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
    }

    .side-panel {
      padding: 18px;
      height: fit-content;
    }

    .side-panel h3 {
      margin: 0 0 10px;
    }

    .side-panel p {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .form-grid .span-2 {
      grid-column: 1 / -1;
    }

    .checkbox-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .choice {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 44px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius-control);
      background: #ffffff;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .choice input {
      accent-color: var(--brand-light);
    }

    .nps-row {
      display: grid;
      grid-template-columns: repeat(11, minmax(30px, 1fr));
      gap: 6px;
    }

    .nps-row input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .nps-row label {
      min-height: 38px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: var(--radius-control);
      color: var(--muted);
      background: #ffffff;
      cursor: pointer;
      font-weight: 800;
      transition: background 160ms ease, border-color 160ms ease, color 160ms ease;
    }

    .nps-row input:checked + label {
      color: #ffffff;
      border-color: var(--brand);
      background: linear-gradient(135deg, var(--brand), var(--brand-light));
    }

    .form-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
    }

    .plaza-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
    }

    .toolbar-actions {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: thin;
    }

    .tab {
      min-height: 40px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #ffffff;
      color: var(--muted);
      font-weight: 800;
      white-space: nowrap;
    }

    .tab.active {
      color: #ffffff;
      border-color: rgba(88, 210, 255, 0.48);
      background: linear-gradient(135deg, var(--brand), var(--brand-light));
    }

    .plaza-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 310px;
      gap: 18px;
    }

    .feed {
      display: grid;
      gap: 14px;
    }

    .post {
      border: 1px solid var(--line);
      border-radius: var(--radius-card);
      background: var(--surface);
      box-shadow: var(--shadow);
      overflow: hidden;
      cursor: pointer;
      transition: border-color 160ms ease, box-shadow 160ms ease, transform 160ms ease;
    }

    .post:hover {
      border-color: rgba(30, 71, 124, 0.28);
      box-shadow: 0 2px 6px rgba(16, 24, 40, 0.05), 0 26px 64px rgba(30, 71, 124, 0.15);
      transform: translateY(-1px);
    }

    .post-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px 12px;
      border-bottom: 1px solid var(--line);
    }

    .author {
      display: flex;
      align-items: center;
      gap: 11px;
      min-width: 0;
    }

    .author-avatar {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      flex: 0 0 auto;
      overflow: hidden;
      display: grid;
      place-items: center;
      color: #ffffff;
      background: linear-gradient(135deg, var(--brand), var(--brand-light));
      font-weight: 900;
    }

    .author-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .author strong {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 420px;
    }

    .author span {
      display: block;
      color: var(--faint);
      font-size: 12px;
      margin-top: 2px;
    }

    .post-time {
      color: var(--faint);
      font-size: 12px;
      white-space: nowrap;
    }

    .post-body {
      padding: 18px;
    }

    .post-body h3 {
      margin: 0;
      font-size: 20px;
      line-height: 1.35;
    }

    .post-body p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .post-project-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 12px;
      color: var(--accent);
      font-size: 13px;
      font-weight: 850;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .post-attachment {
      margin: 14px 0 0;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius-card);
      background: #ffffff;
    }

    .post-attachments {
      display: grid;
      gap: 12px;
      margin-top: 14px;
    }

    .post-attachments .post-attachment {
      margin: 0;
    }

    .post-attachment img {
      width: 100%;
      max-height: 360px;
      object-fit: contain;
      background: #f9fafb;
    }

    .post-attachment figcaption {
      padding: 9px 12px;
      border-top: 1px solid var(--line);
      color: var(--faint);
      font-size: 12px;
      line-height: 1.45;
    }

    .post-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      max-width: 100%;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      color: var(--brand);
      background: #ffffff;
      border: 1px solid rgba(30, 71, 124, 0.28);
      font-size: 12px;
      font-weight: 800;
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .post-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px 14px;
      border-top: 1px solid var(--line);
      background: #f9fafb;
    }

    .icon-btn {
      min-height: 36px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 0 11px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #ffffff;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      transition: background 160ms ease, color 160ms ease, transform 160ms ease;
    }

    .icon-btn:hover {
      color: var(--brand);
      background: var(--accent-soft);
    }

    .icon-btn:active {
      transform: translateY(1px);
    }

    .icon-btn.liked {
      color: var(--ok);
      border-color: #abefc6;
      background: #ecfdf3;
    }

    .comment-list {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .comment {
      padding: 10px 12px;
      border-radius: var(--radius-card);
      background: #f9fafb;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .comment-person {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
      padding: 12px;
      border-radius: var(--radius-card);
      background: #f9fafb;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .person-avatar {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      display: grid;
      place-items: center;

    // Public copy of platform-demo.html#task=prep. Keep the original guide markup unchanged.
    const standalonePrepMode = true;
    const runtimeConfig = window.__AI_HERMES_CONFIG__ || {};
    const runtimeBasePath = (() => {
      const raw = String(runtimeConfig.basePath || "").trim();
      if (!raw || raw === "/") return "";
      return `/${raw.replace(/^\/+|\/+$/g, "")}`;
    })();
    const runtimeEnv = runtimeConfig.appEnv || "local";

    function appUrl(path) {
      const value = String(path || "");
      if (/^(https?:|data:|blob:)/i.test(value)) return value;
      if (value.startsWith("/uploads/") || value.startsWith("/api/")) return `${runtimeBasePath}${value}`;
      return value;
    }

    function mediaUrl(path) {
      return appUrl(path);

      if (runtimeBasePath && path.startsWith(runtimeBasePath)) {
        path = path.slice(runtimeBasePath.length) || "/";
      }
      const match = path.match(/^\/project\/([^/]+)\/?$/);
      return match ? decodeURIComponent(match[1]) : "";
    }

    function legacyShareTokenFromHash() {
      const hash = window.location.hash.replace(/^#/, "");
      if (!hash.startsWith("share=")) return "";
      return decodeURIComponent(hash.split("=")[1] || "");
    }

    function publicProjectTokenFromLocation() {
      return publicProjectTokenFromPath() || legacyShareTokenFromHash();
    }

    function publicProjectUrl(post) {

      return `${location.origin}${runtimeBasePath || ""}/project/${encodeURIComponent(token)}`;

      const payload = await response.json().catch(() => ({}));
      if (!response.ok) {

      return payload;

        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function firstChar(name) {
      return (name || "AI").trim().slice(0, 1).toUpperCase();
    }

    function normalizePerson(person, fallbackName = "学员") {
      if (person && typeof person === "object") {
        return {
          name: person.name || person.author || fallbackName,
          role: person.role || "",
          avatar: person.avatar || ""
        };
      }
      return {
        name: String(person || fallbackName),
        role: "",
        avatar: ""
      };
    }

    function personAvatarHtml(person) {
      const normalized = normalizePerson(person);
      const name = normalized.name || "AI";
      if (normalized.avatar) {
        return `<img src="${escapeHtml(mediaUrl(normalized.avatar))}" alt="${escapeHtml(name)}头像" />`;
      }
      return escapeHtml(firstChar(name));
    }

    function likePeople(post) {
      const people = Array.isArray(post.likedBy) ? post.likedBy.map((person) => normalizePerson(person)) : [];
      if (state.liked[post.id] && state.user) {
        const currentUser = normalizePerson({
          name: state.user.nickname || "我",
          role: "我",
          avatar: state.user.avatar || ""
        });
        const alreadyListed = people.some((person) => person.name === currentUser.name);
        return alreadyListed ? people : [currentUser, ...people];
      }
      return people;
    }

    function likeCount(post) {
      return likePeople(post).length;
    }

    function likePersonHtml(person) {
      const normalized = normalizePerson(person);
      return `
        <span class="like-person">
          <span class="person-avatar">${personAvatarHtml(normalized)}</span>
          <span>${escapeHtml(normalized.name)}</span>
        </span>
      `;
    }

    function normalizeComment(comment) {
      if (comment && typeof comment === "object") {
        const role = String(comment.role || "").trim();
        return {
          author: comment.author || comment.name || "学员",
          role: role && role !== "活动参与者" ? role : "",
          avatar: comment.avatar || "",
          text: comment.text || comment.body || ""
        };
      }
      const text = String(comment || "");
      const match = text.match(/^([^：:]{1,16})[：:](.+)$/);
      if (match) {
        return {
          author: match[1].trim() || "学员",
          role: "",
          avatar: "",
          text: match[2].trim()
        };
      }
      return {
        author: "学员",
        role: "",
        avatar: "",
        text
      };
    }

    function commentHtml(comment) {
      const normalized = normalizeComment(comment);
      return `
        <div class="comment-person">
          <div class="person-avatar">${personAvatarHtml({
            name: normalized.author,
            avatar: normalized.avatar
          })}</div>
          <div>
            <strong>${escapeHtml(normalized.author)}${normalized.role ? `<span> / ${escapeHtml(normalized.role)}</span>` : ""}</strong>
            <p>${escapeHtml(normalized.text)}</p>
          </div>
        </div>
      `;
    }

    function shanghaiDateKey(date = new Date()) {
      const parts = new Intl.DateTimeFormat("en", {
        timeZone: "Asia/Shanghai",
        year: "numeric",
        month: "2-digit",
        day: "2-digit"
      }).formatToParts(date);
      const valueByType = {};
      parts.forEach((part) => {
        valueByType[part.type] = part.value;
      });
      return `${valueByType.year}-${valueByType.month}-${valueByType.day}`;
    }

    function activePhaseInfo() {

        { title: "会前", start: "2026-07-01", end: "2026-07-03" },

        { title: "会后", start: "2026-07-06", end: "2026-08-06" }
      ];
      const current = ranges.find((range) => today >= range.start && today <= range.end);
      if (current) return { ...current, label: "当前阶段" };
      if (today < ranges[0].start) return { ...ranges[0], label: "即将开始" };
      if (today > ranges[ranges.length - 1].end) return { ...ranges[ranges.length - 1], label: "可继续补交" };
      return null;

    function clonePastedImages(payload) {
      return Object.fromEntries(
        Object.entries(payload?.pastedImages || {})
          .map(([field, images]) => [
            field,
            (Array.isArray(images) ? images : [])
              .filter((image) => image?.dataUrl || image?.url)
              .map((image) => ({ ...image, dataUrl: image.dataUrl || image.url }))
          ])
          .filter(([, images]) => images.length)
      );
    }

    function payloadTimestamp(value) {
      if (!value) return 0;
      if (typeof value === "number") return value;
      return new Date(value).getTime() || 0;
    }

    function formatShanghaiTimestamp(value) {
      const timestamp = payloadTimestamp(value);
      if (!timestamp) return "";
      const date = new Date(timestamp);
      const parts = Object.fromEntries(
        new Intl.DateTimeFormat("zh-CN", {
          timeZone: "Asia/Shanghai",
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          hour12: false
        }).formatToParts(date).map((part) => [part.type, part.value])
      );
      const currentYear = new Intl.DateTimeFormat("en", {
        timeZone: "Asia/Shanghai",
        year: "numeric"
      }).format(new Date());
      const dateText = `${Number(parts.month)}月${Number(parts.day)}日 ${parts.hour}:${parts.minute}`;
      return parts.year === currentYear ? dateText : `${parts.year}年${dateText}`;
    }

    function postTimeText(post) {
      const realTime = post.submittedAt || post.updatedAt || post.createdAt;
      return formatShanghaiTimestamp(realTime);
    }

    function isOwnSubmission(item) {
      if (!item) return false;
      if (item.mine) return true;
      const currentPhone = normalizePhone(state.user?.phone || "");
      const itemPhone = normalizePhone(item.phone || item.userPhone || "");
      return Boolean(currentPhone && itemPhone && currentPhone === itemPhone);
    }

    function hasOwnSubmission(type) {
      return state.submissions.some((item) => item.type === type && isOwnSubmission(item));
    }

    function meaningfulPayload(payload) {
      return Object.fromEntries(
        Object.entries(payload || {}).filter(([, value]) => {
          if (Array.isArray(value)) return value.length;
          if (value && typeof value === "object") return Object.keys(value).length;
          return String(value || "").trim();
        })
      );
    }

    function latestPayload(type) {
      const found = [...state.submissions]
        .filter((item) => item.type === type && item.raw && isOwnSubmission(item))
        .sort((a, b) => b.createdAt - a.createdAt)[0];
      const draft = state.drafts[type];
      const draftTime = payloadTimestamp(draft?.updatedAt || draft?.createdAt);
      const submissionTime = payloadTimestamp(found?.updatedAt || found?.submittedAt || found?.createdAt);
      const draftRaw = meaningfulPayload(draft?.raw);
      if (Object.keys(draftRaw).length && (!found || draftTime >= submissionTime)) {
        return { ...(found?.raw || {}), ...draftRaw };
      }
      return found?.raw || draft?.raw || {};
    }

    function addPayloadValue(payload, key, value) {
      if (payload[key]) {
        payload[key] = Array.isArray(payload[key]) ? [...payload[key], value] : [payload[key], value];
      } else {
        payload[key] = value;
      }
    }

    function fileToDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(reader.error);
        reader.readAsDataURL(file);
      });
    }

    function renderPastedImages(field) {
      const holder = document.querySelector(`[data-pasted-images="${field}"]`);
      if (!holder) return;
      const images = pastedImagesByField[field] || [];
      holder.innerHTML = images.map((image) => `
        <figure class="pasted-image">
          <img src="${escapeHtml(mediaUrl(image.dataUrl))}" alt="${escapeHtml(image.name)}" />
          <span>${escapeHtml(image.name)}</span>
        </figure>
      `).join("");
    }

    async function handleTextareaImagePaste(event) {
      const textarea = event.target.closest("[data-paste-image-field]");
      if (!textarea) return;
      const imageItems = Array.from(event.clipboardData?.items || [])
        .filter((item) => item.kind === "file")
        .map((item) => item.getAsFile())
        .filter((file) => file && file.type.startsWith("image/"));
      if (!imageItems.length) return;
      event.preventDefault();
      const field = textarea.dataset.pasteImageField;
      pastedImagesByField[field] = pastedImagesByField[field] || [];
      for (const file of imageItems) {
        const dataUrl = await fileToDataUrl(file);
        pastedImagesByField[field].push({
          name: file.name || `粘贴图片 ${pastedImagesByField[field].length + 1}`,
          type: file.type,
          size: file.size,
          dataUrl
        });
      }
      renderPastedImages(field);
      showToast("图片已粘贴到当前输入框");
    }

    async function collectForm(form) {
      const data = new FormData(form);
      const payload = {};
      for (const [key, value] of data.entries()) {
        if (value instanceof File) {
          if (!value.name || value.size === 0) continue;
          const dataUrl = await fileToDataUrl(value);
          addPayloadValue(payload, key, {
            name: value.name,
            type: value.type,
            size: value.size,
            dataUrl
          });
          continue;
        }
        addPayloadValue(payload, key, value);
      }
      const pastedImages = Object.fromEntries(
        Object.entries(pastedImagesByField).filter(([, images]) => Array.isArray(images) && images.length)
      );
      if (Object.keys(pastedImages).length) {
        payload.pastedImages = pastedImages;
      }
      return payload;
    }

    function copyText(text) {
      if (navigator.clipboard && window.isSecureContext) {
        return navigator.clipboard.writeText(text);

      const area = document.createElement("textarea");
      area.value = text;
      area.className = "sr-only";

      area.remove();

    function loadImageElement(src) {
      return new Promise((resolve, reject) => {
        const image = new Image();
        image.onload = () => resolve(image);
        image.onerror = () => reject(new Error("图片无法读取，请换一张 JPG、PNG 或 WebP 图片。"));
        image.src = src;
      });
    }

    async function fileToAvatarDataUrl(file) {
      if (!file || !String(file.type || "").startsWith("image/")) {
        throw new Error("请选择图片文件。");
      }
      if (file.size > 16 * 1024 * 1024) {
        throw new Error("头像原图太大，请选择 16MB 以内的图片。");
      }

      const objectUrl = URL.createObjectURL(file);
      try {
        const image = await loadImageElement(objectUrl);
        const size = 512;
        const sourceSize = Math.min(image.naturalWidth || image.width, image.naturalHeight || image.height);
        if (!sourceSize) throw new Error("图片尺寸异常，请换一张图片。");
        const sx = ((image.naturalWidth || image.width) - sourceSize) / 2;
        const sy = ((image.naturalHeight || image.height) - sourceSize) / 2;
        const canvas = document.createElement("canvas");
        canvas.width = size;
        canvas.height = size;
        const context = canvas.getContext("2d");
        context.drawImage(image, sx, sy, sourceSize, sourceSize, 0, 0, size, size);
        return canvas.toDataURL("image/jpeg", 0.86);
      } finally {
        URL.revokeObjectURL(objectUrl);
      }
    }

    document.getElementById("avatar").addEventListener("change", async (event) => {
      const file = event.target.files && event.target.files[0];
      if (!file) return;
      const preview = document.getElementById("avatarPreview");
      preview.textContent = "处理中";
      delete preview.dataset.avatar;
      try {
        const dataUrl = await fileToAvatarDataUrl(file);
        preview.innerHTML = `<img src="${dataUrl}" alt="头像预览" />`;
        preview.dataset.avatar = dataUrl;
      } catch (error) {
        event.target.value = "";
        preview.textContent = "AI";
        showToast(error.message || "头像读取失败，请换一张图片。");
      }
    });

    document.getElementById("loginForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      const form = event.currentTarget;
      const payload = {
        phone: normalizePhone(form.phone.value),
        password: form.password.value,
        nickname: form.nickname.value.trim(),
        avatar: document.getElementById("avatarPreview").dataset.avatar || ""
      };
      setLoginBusy(true);
      try {
        state.user = usesBackendAuth() ? await loginWithBackend(payload) : loginWithLocalDemo(payload);
        writeJson("aiHermesDemoUser", state.user);
        await loadBackendSubmissions();
        await loadBackendDrafts();
        syncOwnSubmissionAuthorSnapshot();
        window.location.hash = "home";
        ensureApp();
        render();
        showToast("已进入工作台");
      } catch (error) {
        showToast(error.message || "登录失败，请检查手机号和密码。");
      } finally {
        setLoginBusy(false);
      }
    });

    document.addEventListener("paste", handleTextareaImagePaste);

    document.addEventListener("click", async (event) => {
      if (event.target.matches("[data-modal-backdrop]") || event.target.closest("[data-close-modal]")) {
        closeProjectModal();
        return;
      }

      const logoutButton = event.target.closest("[data-logout]");
      if (logoutButton) {
        if (usesBackendAuth()) {
          await apiJson("/api/auth/logout", { method: "POST", body: "{}" }).catch(() => null);
        }
        removeJson("aiHermesDemoUser");
        state.user = null;
        state.drafts = {};
        window.location.hash = "";
        appView.classList.add("hidden");
        loginView.classList.remove("hidden");
        document.getElementById("loginForm").reset();
        document.getElementById("avatarPreview").textContent = "AI";
        delete document.getElementById("avatarPreview").dataset.avatar;
        showToast("已回到登录页");
        return;
      }

      const taskButton = event.target.closest("[data-task]");
      if (taskButton) {
        window.location.hash = `task=${taskButton.dataset.task}`;
        return;
      }

      const plazaOpen = event.target.closest("[data-plaza-open]");
      if (plazaOpen) {
        window.location.hash = `plaza=${plazaOpen.dataset.plazaOpen}`;
        return;
      }

      const plazaTab = event.target.closest("[data-plaza-tab]");
      if (plazaTab) {
        window.location.hash = `plaza=${plazaTab.dataset.plazaTab}`;
        return;
      }

      const scrollTarget = event.target.closest("[data-scroll-target]");
      if (scrollTarget) {
        event.preventDefault();
        window.location.hash = "timeline";
        return;
      }

      const likeButton = event.target.closest("[data-like]");
      if (likeButton) {
        const id = likeButton.dataset.like;
        const wasModalOpen = Boolean(likeButton.closest("[data-modal-backdrop]"));
        const publicToken = publicProjectTokenFromLocation();
        try {
          if (usesBackendAuth()) {
            await toggleLikeOnBackend(id);
            if (publicToken) await loadPublicSubmission(publicToken);
          } else {
            state.liked[id] = !state.liked[id];
            writeJson("aiHermesDemoLiked", state.liked);
          }
        } catch (error) {
          showToast(error.message || "点赞失败，请稍后再试。");
          return;
        }
        render();
        if (wasModalOpen) {
          window.setTimeout(() => openProjectModal(id, typeByPostId(id)), 30);
        }
        return;
      }

      const commentButton = event.target.closest("[data-comment]");
      if (commentButton) {
        const id = commentButton.dataset.comment;
        openProjectModal(id, typeByPostId(id));
        return;
      }

      const commentSubmit = event.target.closest("[data-comment-submit]");
      if (commentSubmit) {
        const id = commentSubmit.dataset.commentSubmit;
        const input = document.querySelector(`[data-comment-input="${id}"]`);
        const text = input?.value.trim() || "";
        if (!text) {
          showToast("先写一句评论再发送");
          return;
        }
        const publicToken = publicProjectTokenFromLocation();
        try {
          if (usesBackendAuth()) {
            await addCommentToBackend(id, text);
            if (publicToken) await loadPublicSubmission(publicToken);
          } else {
            state.comments[id] = [
              ...(state.comments[id] || []),
              {
                author: state.user?.nickname || "学员",
                avatar: state.user?.avatar || "",
                role: state.user?.company || "",
                text
              }
            ];
            writeJson("aiHermesDemoComments", state.comments);
          }
        } catch (error) {
          showToast(error.message || "评论失败，请稍后再试。");
          return;
        }
        showToast("评论已发布");
        if (document.querySelector("[data-modal-backdrop]")) {
          openProjectModal(id, typeByPostId(id));
        } else {
          render();
        }
        return;
      }

      const shareButton = event.target.closest("[data-share]");
      if (shareButton) {
        const post = findPost(shareButton.dataset.share);
        if (!post) return;
        const url = publicProjectUrl(post);
        const text = `我在 AI 数字员工实战坊看到一个项目：${post.title}\n来自：${post.author}\n${url}`;
        copyText(text).then(() => showToast("已复制项目链接"));
        return;
      }

      const postOpen = event.target.closest("[data-open-post]");
      if (postOpen && !event.target.closest("a")) {
        const id = postOpen.dataset.openPost;
        openProjectModal(id, postOpen.dataset.postType || typeByPostId(id));
        return;
      }

      const draftButton = event.target.closest("[data-save-draft]");
      if (draftButton) {
        const form = draftButton.closest("form");
        if (!form) return;
        const type = form.dataset.submitType;
        draftButton.disabled = true;
        try {
          const payload = await collectForm(form);
          if (usesBackendAuth()) {
            await saveDraftToBackend(type, payload);
          } else {
            saveDraft(type, payload);
          }
          showToast("草稿已保存");
        } catch (error) {
          showToast(error.message || "草稿保存失败，请稍后再试。");
        } finally {
          draftButton.disabled = false;
        }
        return;
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") closeProjectModal();
    });

    document.addEventListener("submit", async (event) => {
      const form = event.target.closest(".demo-form");
      if (!form) return;
      event.preventDefault();
      const type = form.dataset.submitType;
      const payload = await collectForm(form);
      if (usesBackendAuth()) {
        await saveSubmissionToBackend(type, payload);
      } else {
        saveSubmission(type, payload);
      }
      showToast("提交成功，已进入广场");
      const nextHash = `plaza=${type}`;
      if (window.location.hash === `#${nextHash}`) {
        render();
      } else {
        window.location.hash = nextHash;
      }
    });

    window.addEventListener("hashchange", render);

    async function boot() {
      if (standalonePrepMode) {
        window.history.replaceState(null, "", `${location.pathname}${location.search}#task=prep`);
        ensureApp();
        render();
        iconRefresh();
        return;
      }

      const publicToken = publicProjectTokenFromLocation();
      try {
        if (usesBackendAuth()) {
          await restoreBackendSession();
          if (publicToken) {
            await loadPublicSubmission(publicToken);
            normalizeLegacyPublicProjectUrl(publicToken);
          } else {
            await loadBackendSubmissions();
            await loadBackendDrafts();
          }
        } else {
          validateLocalDemoSession();
        }
      } catch (error) {
        if (publicToken) {
          state.publicPost = null;
          state.publicError = error.message || "这个项目链接可能已经失效。";
        } else {
          state.user = null;
          removeJson("aiHermesDemoUser");
          showToast("登录状态已过期，请重新进入。");
        }
      }

      if (publicToken) {
        loginView.classList.add("hidden");
        appView.classList.remove("hidden");
        render();
        iconRefresh();
        return;
      }

      if (!state.user) {
        loginView.classList.remove("hidden");
        appView.classList.add("hidden");
      } else {
        ensureApp();
        if (!window.location.hash) window.location.hash = "home";
        render();
      }

      iconRefresh();
    }

    boot();
  </script>
</body>
</html>
